  # ─────────────────────────────────────────────────────────────────
  # B. FORMAT DECISIONS — which tech for which asset (3 items)
  # ─────────────────────────────────────────────────────────────────
  - id: 6
    name: "SVG vs PNG vs WebP vs Lottie vs Rive vs MP4 — Decision Framework"
    category: "B. Formats"
    seed_facts:
      - "SVG: vector, scalable, animatable via CSS/SMIL/JS — best for icons + simple illustrations"
      - "PNG: raster, transparency, larger file — fallback / complex illustrations"
      - "WebP: better compression than PNG/JPG, broad 2026 support"
      - "Lottie (JSON): vector animation from After Effects via Bodymovin — small file, runtime control"
      - "Rive (.riv): vector + state machines, smaller than Lottie for interactive, free editor"
      - "MP4 / WebM: video — heaviest, only when video is the medium"
      - "Decision matrix needed by asset type"

  - id: 7
    name: "Lottie Deep-Dive: Creation + Optimization + Runtime"
    category: "B. Formats"
    seed_facts:
      - "Free: LottieFiles library + Lottielab editor (freemium) + Jitter (freemium)"
      - "Paid: After Effects + Bodymovin export ($23/mo Adobe single-app)"
      - "Runtime: lottie-react / lottie-react-native / lottie-web"
      - "Optimization: shape simplification, reduce keyframes, dotLottie format"
      - "When Lottie shines: linear animations, character anim, brand motion"

  - id: 8
