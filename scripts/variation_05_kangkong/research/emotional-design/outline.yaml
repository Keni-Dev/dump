      - "Thielsch et al. meta-analysis: g=0.12 effect on objective performance"
      - "Mechanism: dopamine-driven cognitive bias (halo effect on usability perception)"

  - id: 3
    name: "Cognitive Load Theory + Hick's Law + Gestalt Principles"
    category: "A. Foundations"
    seed_facts:
      - "Hick's Law: decision time scales logarithmically with choices"
      - "Gestalt principles guide pre-attentive grouping"
      - "Foundation for minimalism (Google search, iOS) high-satisfaction interfaces"

  - id: 4
    name: "Peak-End Rule (Kahneman) + Onboarding/Churn Application"
    category: "A. Foundations"
    seed_facts:
      - "Kahneman 1993 — memories shaped by peak moment + ending"
      - "NN/g: front-loaded delight without mid-journey peak underperforms retention"
      - "Actionable: session-end celebrations, weekly wraps, streak-save moments"

  - id: 5
    name: "Self-Determination Theory (Autonomy / Competence / Relatedness)"
    category: "A. Foundations"
    seed_facts:
