# 65 research items, organized into 16 thematic categories.
# Each item is filled against the field framework in fields.yaml.
items:

  # ─────────────────────────────────────────────────────────────────
  # A. PSYCHOLOGY FOUNDATIONS (8)
  # ─────────────────────────────────────────────────────────────────
  - id: 1
    name: "Hook Model — Trigger / Action / Variable Reward / Investment"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Nir Eyal, Hooked (2014); 4-phase cycle for habit formation"
      - "Onboarding flow = first traversal of the hook — establishes the loop"
      - "Investment phase makes switching costly; loads the next external trigger"
      - "Duolingo streak architecture = canonical Hook implementation"

  - id: 2
    name: "Cognitive Load Theory in Onboarding"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Sweller 1988 — working memory ~3-7 items; intrinsic vs extraneous vs germane load"
      - "PMC11422584 (2024): mobile-learning cognitive-load questionnaire validates item-by-item load measurement"
      - "PDF anchor study (PMC12956955): initial complexity creates persistent anchor — overrides actual utility"
      - "Implication: every onboarding screen must do exactly one thing"

  - id: 3
    name: "First Impression Anchoring Bias"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Anchoring bias (Tversky & Kahneman 1974); first piece of info disproportionately weighted"
      - "Cohort study (PMC12956955, N1=100, N2=87, N3=80): initial complexity perception persists regardless of later utility"
      - "Implication: opening 7-10 seconds determine entire app perception"
      - "Counter-tactic: opening must show CARE, not CAPABILITY"

  - id: 4
    name: "Sunk Cost Fallacy / IKEA Effect — The Long-Onboarding Paradox"
    category: "A. Psychology Foundations"
    seed_facts:
      - "IKEA Effect (Norton et al. 2012): people overvalue what they helped create"
      - "Sunk Cost: minutes invested in personalization → unwillingness to abandon"
      - "Cal AI (33 steps → $30M ARR Y1), Flo (height/health/side-effects → trial), Puff Count (smoking-pain survey → hard paywall)"
      - "Mau Baron's quote: '5 → 15 min onboarding tripled organic conversion'"
      - "Inverts the 'minimize friction' default — strategic friction builds value"

  - id: 5
    name: "Self-Determination Theory (Autonomy / Competence / Relatedness)"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Deci & Ryan — three psychological needs for intrinsic motivation"
      - "Springer 2024 meta-analysis: SDT-aligned gamification boosts engagement"
      - "Onboarding application: choices (autonomy), early wins (competence), community sense (relatedness)"
      - "Tension with Hook Model — SDT is the ethical scaffolding"

  - id: 6
    name: "Peak-End Rule for First-Session Memory"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Kahneman 1993 — memory shaped by peak moment + ending, not duration"
      - "Onboarding = the user's first session; its peak + end define their cognitive anchor"
      - "Cal AI's 'mid-onboarding review prompt' = engineered peak deployed at activation"
      - "NN/g: front-loaded delight without mid-journey peak underperforms retention"

  - id: 7
    name: "Goal-Gradient Effect & Progress Indicator Psychology"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Hull 1932 / Kivetz et al. 2006: motivation increases as goal nears"
      - "Endowed-progress (head start on punch card) doubles completion rates"
      - "Multi-step flows w/ progress ('Step 2 of 5') yield materially higher completion"
      - "Progress bars must show motion within 200ms of input"

  - id: 8
    name: "Hick's Law + Decision Fatigue"
    category: "A. Psychology Foundations"
    seed_facts:
      - "Hick 1952: decision time scales logarithmically with choices"
      - "Each onboarding question adds load; load compounds toward abandonment"
      - "Workaround: use prepopulated defaults (recommended highlight) + 3-4 options/screen max"
      - "Critical for paywall plan-selection psychology"

  # ─────────────────────────────────────────────────────────────────
  # B. AHA MOMENT & ACTIVATION (7)
  # ─────────────────────────────────────────────────────────────────
  - id: 9
    name: "Aha Moment vs Activation — Distinction"
    category: "B. Aha & Activation"
    seed_facts:
      - "Aha = cognitive realization of value (Uber: 'I can summon a car here')"
      - "Activation = first successful use of core feature (Uber: 'I ordered my first ride')"
      - "Onboarding must hit Aha before friction; can defer activation"
      - "Source: Appcues Aha Moment Guide, ProductLed"

  - id: 10
    name: "Time-to-Value (TTV) Frameworks"
    category: "B. Aha & Activation"
    seed_facts:
      - "Reforge: TTV = time-from-install to first-perceived-value moment"
      - "Industry target: TTV < 60 seconds for consumer mobile"
      - "Eleken examples: Linear, Cron, Stripe Atlas — sub-minute TTV"
      - "Long-onboarding apps achieve TTV via promise-front-loading + AI-reveal at end"

  - id: 11
    name: "Behavioral Cohort Analysis to Discover Aha"
    category: "B. Aha & Activation"
    seed_facts:
      - "Compare retained-cohort actions vs churned-cohort actions"
      - "Facebook's '7 friends in 10 days', Slack's '2000 messages', Twitter's '30 follows'"
      - "Method: PostHog/Mixpanel/Amplitude funnel comparison; behavioral correlation > intuition"
      - "For new apps without data: borrow from category benchmarks; iterate post-launch"

  - id: 12
    name: "AI-Generated Plan Reveal as Activation Moment"
    category: "B. Aha & Activation"
    seed_facts:
      - "Cal AI: questionnaire answers → GPT-personalized macro plan → reveal → $30M ARR Y1"
      - "Mau Baron Prayer Lock: questionnaire → AI-generated personalized prayer reveal"
      - "Distinct from 'data seeding' — this is *generative* (LLM-driven), not pre-loaded"
      - "Aha is created BY the LLM during onboarding, before user has done anything in-app"
      - "Trade-off: latency, cost, offline-fallback design"

  - id: 13
    name: "Personalized-Plan Loader / Theatrical Wait"
    category: "B. Aha & Activation"
    seed_facts:
      - "2-10s loader animation: 'Analyzing your responses... Cross-referencing 2.4M users like you...'"
      - "Adapty 2026: top-performing pattern; doubles trust + conversion"
      - "NOT 'Wasted Loading' antipattern — this is engineered loading with narrative"
      - "Failure mode: loader < 3s feels fake; loader > 12s feels broken"

  - id: 14
    name: "Cross-Step Personalization Stitching"
    category: "B. Aha & Activation"
    seed_facts:
      - "User's answer in step 3 visibly changes copy in step 7 ('Because you said you wanted to lose 10lb...')"
      - "Headway, Cal AI, Flo, Noom all do this; Mobbin teardowns confirm"
      - "Difference between data collection and *felt* personalization"
      - "Implementation: state-machine context object passed across screens"

  - id: 15
    name: "Mid-Onboarding Review Prompt"
    category: "B. Aha & Activation"
    seed_facts:
      - "Cal AI prompts for App Store review DURING onboarding (after AI plan reveal, before paywall)"
      - "Counterintuitive — works because peak emotional state is engineered there"
      - "Avoids App Store review-fatigue mid-app where typical reviews fire"
      - "Pairs Peak-End Rule (item 6) with concrete implementation"

  # ─────────────────────────────────────────────────────────────────
  # C. ONBOARDING PATTERNS (10)
  # ─────────────────────────────────────────────────────────────────
  - id: 16
    name: "Progressive Disclosure"
    category: "C. Patterns"
    seed_facts:
      - "NN/G canonical pattern; sequence info/actions; defer secondary functions"
      - "Counter to 'single-screen' antipattern"
      - "Applies recursively: account → personalization → permissions → paywall → empty state"
      - "YouTube Android coach marks = canonical contextual progressive disclosure"

  - id: 17
    name: "Long Questionnaire / Sunk-Cost Pattern (Cal-AI Style)"
    category: "C. Patterns"
    seed_facts:
      - "Cal AI 33-step quiz with AI plan reveal at step ~30 → soft paywall"
      - "Flo period-tracker height/health/side-effects → mandatory trial commitment"
      - "Puff Count smoking-cessation pain survey → hard paywall"
      - "Mechanism: sunk cost + endowment + peak (AI reveal) + paywall = hardest convert"

  - id: 18
    name: "Story-Onboarding Doctrine 5-15min (Mau-Baron Style)"
    category: "C. Patterns"
    seed_facts:
      - "Mau Baron Prayer Lock: 5min → 15min extension tripled organic conversion"
      - "Structure: affirm → social proof → demo → personalize → AI reveal → paywall"
      - "Each step EARNS the next; narrative arc is load-bearing"
      - "Distinct from Cal-AI's questionnaire-heavy version: story uses identity/emotion, not data collection"
      - "Direct quote: 'as long as it's adding value and telling a story, the longer the better'"

  - id: 19
    name: "Frictionless / Deferred Pattern"
    category: "C. Patterns"
    seed_facts:
      - "Instagram: username + password only; assumes user knows the value"
      - "Acorns: defines onboarding success strictly as 'link bank account'"
      - "Works only when category value is universally understood"
      - "Wrong choice for novel categories or high-LTV verticals"

  - id: 20
    name: "Benefits-Led vs Feature-Led Narrative Architecture"
    category: "C. Patterns"
    seed_facts:
      - "Blinkist: 'Understand powerful ideas in 15 minutes' (outcome) vs 'thousands of book summaries' (feature)"
      - "Users are indifferent to algorithms/tech stacks; care about resolution of stressors"
      - "Onboarding narrative must aggressively sell outcomes, not technical inventories"

  - id: 21
    name: "Empty State + Data Seeding"
    category: "C. Patterns"
    seed_facts:
      - "Bare dashboard = critical drop-off point post-onboarding"
      - "Seed: template content, instructional artifacts, sandbox examples, pre-populated friend suggestions"
      - "Notion's 'getting started' templates, Linear's example issues, Spotify's onboarding-derived first playlist"
      - "Different from AI Plan Reveal (item 12): seeded data is *static*, not generated"

  - id: 22
    name: "Coach Marks / Spotlights / Tooltips"
    category: "C. Patterns"
    seed_facts:
      - "YouTube Android = canonical contextual coach mark"
      - "Trigger only when user navigates to unfamiliar section (not on cold launch)"
      - "Industry tooling: Plotline, Appcues Mobile, Pendo, Product Fruits"
      - "Failure mode: deck-of-cards carousel as a substitute (taxes working memory)"

  - id: 23
    name: "Interactive Walkthroughs (Learn-by-Doing)"
    category: "C. Patterns"
    seed_facts:
      - "Pudding Monsters animated hand-overlay = canonical learn-by-doing"
      - "Practice round in low-stakes sandbox before live data"
      - "Most effective for complex/unfamiliar workflows (gaming, creative tools)"
      - "AI-codegen failure: defaults to a deck-of-cards 'tour' instead of true interaction"

  - id: 24
    name: "Permission Priming Pattern (incl. Permission Ladder)"
    category: "C. Patterns"
    seed_facts:
      - "Pre-permission education screen → soft ask → native dialog"
      - "Order matters: push primer → soft ask → native, THEN ATT, THEN feature-gated (camera/location/health)"
      - "iOS opt-in average 43.9% / Android 81.5% (2025); planned ladder closes that gap"
      - "Counter to Contextless Permissions antipattern"

  - id: 25
    name: "Cinematic 4-Screen Pattern (Adam Lyttle)"
    category: "C. Patterns"
    seed_facts:
      - "Welcome / Social Proof / Core Demo / Paywall — fullscreen animated"
      - "For apps that don't need personalization (utilities, single-feature)"
      - "Distinct from long-questionnaire — the value prop is universal enough to skip personalization"
      - "Source: infocaptor.com summary of Adam Lyttle's onboarding teardown"

  # ─────────────────────────────────────────────────────────────────
  # D. QUESTIONNAIRE DESIGN (4)
  # ─────────────────────────────────────────────────────────────────
  - id: 26
    name: "Question Sequencing Strategy"
    category: "D. Questionnaire"
    seed_facts:
      - "Low-friction first (preference: 'pick a color'), commitment-building middle (goals), painpoint placement (engineered peak), identity at end"
      - "Cal AI sequencing: appearance → goals → metrics → constraints → AI reveal"
      - "Wrong sequencing: demographic-heavy openings feel like data collection, not personalization"
      - "Sunk-cost compounds question-by-question — order matters"

  - id: 27
    name: "Question Type Taxonomy"
    category: "D. Questionnaire"
    seed_facts:
      - "Types: preference (color/style), demographic (age/gender), goal (target weight/streak), painpoint (what hurts now), identity (who you are), social-proof punctuation ('5M users like you...')"
      - "Mix types — homogeneous types feel like a survey, not a journey"
      - "Cal AI uses ~6 distinct types across 33 steps"
      - "Identity questions (e.g., 'Are you a runner?') outperform demographic ('What's your age range?')"

  - id: 28
    name: "Conversational vs Form-Style"
    category: "D. Questionnaire"
    seed_facts:
      - "Conversational: one question per screen, big-button selection, text speech-bubble framing"
      - "Form: multi-question density (DMV-style)"
      - "Conversational dominates 2024-2026 onboarding (Cal AI, Flo, Headspace, Mau Baron)"
      - "Form-style only acceptable for mandatory KYC/auth flows"

  - id: 29
    name: "Progress Indicators & Step Architecture"
    category: "D. Questionnaire"
    seed_facts:
      - "Multi-step bars showing 'Step 2 of 5' yield materially higher completion (PDF cite)"
      - "Endowed-progress: start at 'Step 2 of 8' rather than 'Step 1 of 7'"
      - "Bar fill speed must feel proportional to step (not equal-width gimmick)"
      - "Long onboarding (33 steps): chunked sub-progress ('Section 2 of 4 / Step 2 of 8') reduces fatigue"

  # ─────────────────────────────────────────────────────────────────
  # E. ARCHITECTURE (4)
  # ─────────────────────────────────────────────────────────────────
  - id: 30
    name: "Finite State Machine Architecture"
    category: "E. Architecture"
    seed_facts:
      - "XState v5 (TS-first, persistence helpers) is industry standard 2025-2026"
      - "PDF: 'onboarding is not a sequence of views — it is a state machine'"
      - "BLoC pattern (Flutter), Manager-of-Flows (iOS), unidirectional data flow (React Native)"
      - "States are mutually-exclusive enums; events trigger transitions; reducers are pure"

  - id: 31
    name: "Server-Driven UI for Onboarding"
    category: "E. Architecture"
    seed_facts:
      - "Mobile client renders dynamically from JSON payload (sequence + config + layout)"
      - "Bypasses App Store review cycle for onboarding A/B tests"
      - "Lovi's protocol-oriented approach (Medium @ortayevn)"
      - "Trade-off: bundle complexity vs iteration speed"
      - "Critical when CAC is high — every day of slow iteration burns acquisition budget"

  - id: 32
    name: "State Persistence + Fault Tolerance"
    category: "E. Architecture"
    seed_facts:
      - "Client-side: MMKV (RN, synchronous), UserDefaults (iOS), SharedPreferences (Android)"
      - "Server-side: every step dispatches async payload; backend = source of truth"
      - "Saga pattern / Temporal for paywall + inventory + IAP coordination"
      - "Network-flap recovery, background-termination resilience required"

  - id: 33
    name: "Cross-Device Resume Hydration"
    category: "E. Architecture"
    seed_facts:
      - "User uninstalls in frustration at step 6 → reinstalls weeks later → resume from step 6"
      - "Backend hydrates local state machine on auth"
      - "Reduces lost-funnel cost; especially important for high-CAC apps"
      - "Implementation: server stores onboarding_state per user_id; client requests on auth"

  # ─────────────────────────────────────────────────────────────────
  # F. MONETIZATION (9)
  # ─────────────────────────────────────────────────────────────────
  - id: 34
    name: "Hard Paywall at Onboarding Climax (incl. Toggle-Paywall Ban)"
    category: "F. Monetization"
    seed_facts:
      - "PDF: 'highest volume of subscription conversions occurs during initial onboarding session'"
      - "Adapty 2026: 1.35% trial conversion at onboarding paywall (highest of any placement)"
      - "Hard paywall = no skip, no close — at apex of sunk-cost investment"
      - "**2026-01 Apple Guideline 3.1.2 update: TOGGLE PAYWALLS BANNED** — replace with side-by-side plan selection or timeline transparency"
      - "RevenueCat 2025: hard paywalls = 21% higher LTV; soft paywalls convert ~50% better"

  - id: 35
    name: "Trial vs Direct Purchase Decision"
    category: "F. Monetization"
    seed_facts:
      - "Adapty 2026: weekly + 3-day-trial = $54.50 12mo LTV vs $7.40 without (636% lift)"
      - "AI-wrapper apps see lower trial conv (5.31%) but +14% direct purchase"
      - "Trial works for habit/wellness; direct works for AI-magic-moment apps"
      - "Apple/Google sandbox testing requirement — sandbox flow != prod"

  - id: 36
    name: "Onboarding Localization (incl. Paywall)"
    category: "F. Monetization"
    seed_facts:
      - "Adapty 2026: localization has 62.3% LTV win rate (highest of any test type)"
      - "LATAM: aggressive discount anchoring + monthly-equivalent pricing"
      - "Asia/JP: social proof, verifiable trust indicators, testimonials in UI"
      - "US/EU: nuanced wording + localized price points (Apple's auto-conversion ≠ optimal)"
      - "Translation alone insufficient — regional purchasing-behavior expectations differ"

  - id: 37
    name: "Persistent Buy-Now / Upgrade CTA"
    category: "F. Monetization"
    seed_facts:
      - "PDF: persistent CTA throughout interface = 10-20% revenue lift"
      - "Always-visible upgrade button bypasses need to re-traverse paywall path"
      - "Implementation: floating-action-button or top-bar pattern"
      - "Avoid: showing on every screen for free users (becomes blind-spot)"

  - id: 38
    name: "Plan Selection Psychology"
    category: "F. Monetization"
    seed_facts:
      - "Decoy effect: 3 plans where middle = bait, top = real target"
      - "Default highlighting: pre-select annual at 'most popular' badge"
      - "Anchoring: show monthly/annual savings ('Save 67%')"
      - "Post-toggle-ban (2026-01): side-by-side plan selection now mandatory"
      - "Hick's Law: 3-4 plans max; 5+ tanks conversion"

  - id: 39
    name: "Post-Decline / Win-Back Paywall"
    category: "F. Monetization"
    seed_facts:
      - "Fires when user dismisses primary paywall — offers different SKU (monthly vs annual; 50% off first period)"
      - "Adapty 2026: top-converting compliant alternative to toggle paywalls"
      - "Distinct from persistent CTA — single re-offer, not always-visible"
      - "Risk: regulators flag aggressive win-backs as dark pattern (DFA Q4 2026)"

  - id: 40
    name: "Web-Checkout Parallel Funnel"
    category: "F. Monetization"
    seed_facts:
      - "Post-Apple/Epic ruling + StoreKit External Purchase Link Entitlement"
      - "Higher margin (no 30% Apple cut); ~25-30% revenue lift on routed users"
      - "Onboarding deep-links to web checkout, deep-links back to app"
      - "Apple still requires explicit disclosure modal before redirect"
      - "Android more permissive than iOS"

  - id: 41
    name: "Hybrid Monetization (Sub + Consumable + Lifetime)"
    category: "F. Monetization"
    seed_facts:
      - "RevenueCat 2025: 35% of apps now combine subscriptions with consumables/lifetime"
      - "Pure-subscription is no longer the default"
      - "Onboarding must educate on multiple SKUs without paralysis (Hick's Law)"
      - "Common: free + monthly + annual + lifetime; or free + 'pro pass' consumable"

  - id: 42
    name: "UGC Creative ↔ Onboarding Promise Alignment"
    category: "F. Monetization"
    seed_facts:
      - "Mau Baron / Adapty 2026: first 3 onboarding screens must mirror the ad creative the user clicked"
      - "'What happens in the 5 screens before the paywall determines whether it converts — not the paywall design itself'"
      - "Cross-channel discipline: ad copy + ad visual + onboarding hook + paywall promise = single semantic chain"
      - "Spark Ads (TikTok creator-sourced ads) cut CPA roughly in half in Mau Baron's funnel"
      - "Implementation: ad-id passed as deep-link param → onboarding variant routed accordingly"

  # ─────────────────────────────────────────────────────────────────
  # G. TELEMETRY & EXPERIMENTATION (3)
  # ─────────────────────────────────────────────────────────────────
  - id: 43
    name: "Onboarding Tracking Plan Design (incl. Step-Level)"
    category: "G. Telemetry"
    seed_facts:
      - "Step-level granularity: onboarding_step_viewed / completed / abandoned per step"
      - "Properties: step_id, step_index, total_steps, ad_variant, locale, time_on_step_ms"
      - "Schema-as-code: shared TS types between client and analytics SDK"
      - "Auto-capture (UXCam) + explicit (PostHog/Mixpanel/Amplitude) hybrid is 2026 best practice"
      - "Mojo data: 50% of trial starts come from onboarding paywall — step-level visibility critical"

  - id: 44
    name: "Funnel Analysis + Cohort/LTV Measurement"
    category: "G. Telemetry"
    seed_facts:
      - "Funnel = visualization of dropoff between events; isolates surgical optimization targets"
      - "Cohort = users grouped by install month / acquisition channel / experiment variant"
      - "LTV is the only honest metric (DAU/MAU mask quality)"
      - "Cohort LTV trend > absolute LTV — declining trend signals acquisition-quality decay"

  - id: 45
    name: "Feature Flag + A/B Test Infrastructure"
    category: "G. Telemetry"
    seed_facts:
      - "PostHog (telemetry+flags+experiments+SR), LaunchDarkly, ConfigCat, Eppo"
      - "Decouple deployment from release; ship binary with multiple variants"
      - "Kill switch: instant revert if regression detected (no App Store cycle)"
      - "Top performers run 14.7 paywall experiments/yr (RevenueCat/Adapty 2026)"
      - "Experiment volume → up to 40× revenue gap vs non-testing teams"

  # ─────────────────────────────────────────────────────────────────
  # H. COMPLIANCE (5)
  # ─────────────────────────────────────────────────────────────────
  - id: 46
    name: "GDPR/CCPA + Data Minimization in Onboarding"
    category: "H. Compliance"
    seed_facts:
      - "71% of countries have GDPR-style legislation as of 2025"
      - "Data minimization: collect only what's strictly necessary for core function or explicit business objective"
      - "GDPR-K (Italy/EU minors): explicit, age-appropriate consent flows"
      - "Multi-million Euro fines for improper onboarding data collection (2024-2025)"

  - id: 47
    name: "CMP Integration + ATT Framework"
    category: "H. Compliance"
    seed_facts:
      - "Axeptio, OneTrust, Usercentrics, Ketch — geo-aware consent injection"
